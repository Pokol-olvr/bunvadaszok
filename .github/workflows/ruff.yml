name: Linter

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs: 
  lint:
    runs-on: ubuntu-latest 
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: install python packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ruff
      run: ruff check /home/runner/work/bunvadaszok/bunvadaszok/src/
    
    - name: Ruf Fix
      if: always()
      run: ruff check . --fix /home/runner/work/bunvadaszok/bunvadaszok/src/

    - name: ReRun Ruff
      if: always()
      run: ruff check /home/runner/work/bunvadaszok/bunvadaszok/src/
