name: Linter

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs: 
  lint:
    runs-on: ubuntu-latest 
    steps:
    
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Install python
      uses: actions/setup-python@v4
      with:
          python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run Ruff
      run: ruff check /home/runner/work/bunvadaszok/bunvadaszok/src/
    - name: Run Fixing
      run : ruff --fix /home/runner/work/bunvadaszok/bunvadaszok/src/
