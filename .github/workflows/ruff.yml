name: Linter

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs: 
  lint:
    runs-on: ubuntu-latest    
    timeout-minutes: 2
    permissions:
      contents: write
      pull-requests: write 
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
          token: ${{ secrets.ADMIN_PAT }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: install python packages
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Ruff
      id: first_check
      continue-on-error: true
      run: ruff check /home/runner/work/bunvadaszok/bunvadaszok/src/
    
    - name: Ruf Fix
      if: steps.first_check.outcome == 'failure'
      run: ruff check . --fix /home/runner/work/bunvadaszok/bunvadaszok/src/

    - name: ReRun Ruff
      if: steps.first_check.outcome == 'failure'
      run: ruff check /home/runner/work/bunvadaszok/bunvadaszok/src/

    - name: Új branch és Pull Request létrehozása
      if: steps.first_check.outcome == 'failure'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.ADMIN_PAT }}
        commit-message: "style: ruff auto-fix alkalmazása"
        branch: auto-fix/ruff-${{ github.run_id }}
        title: "🤖 Automatikus Ruff javítások"
        body: "Automatikus javítások alkalmazva."
        base: ${{ github.ref_name }}
